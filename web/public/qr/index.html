<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>MySuperApp - QR Code</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            margin: 30px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #333;
            font-weight: 600;
        }

        .status-text {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .security-badge {
            display: inline-block;
            background: #f0f9ff;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 12px 20px;
            margin-top: 25px;
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
        }

        .error-container {
            background: #fee;
            border-left: 4px solid #f44;
            border-radius: 8px;
            padding: 20px;
            text-align: left;
            margin-top: 20px;
        }

        .error-title {
            font-weight: bold;
            color: #c33;
            margin-bottom: 8px;
        }

        .error-message {
            color: #666;
            font-size: 14px;
        }

        .success-container {
            background: #efe;
            border-left: 4px solid #4a4;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .success-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .qr-info {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            font-size: 12px;
            color: #999;
        }

        .text-container {
            margin-top: 25px;
            padding: 25px;
            background: #f9f9f9;
            border-radius: 12px;
            text-align: center;
        }

        .text-content {
            font-size: 16px;
            color: #333;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        @media (max-width: 480px) {
            .container {
                padding: 35px 25px;
            }

            h1 {
                font-size: 24px;
            }

            .status-text {
                font-size: 15px;
            }
        }

        /* === MURAL === */
        .mural-header {
            margin-bottom: 15px;
        }

        .mural-title {
            font-size: 22px;
            color: #333;
            font-weight: 600;
            text-align: center;
        }

        .mural-notice {
            position: relative;
        }

        .mural-notice-close {
            position: absolute;
            top: 6px;
            right: 8px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            color: #aaa;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .mural-notice-close:hover {
            color: #666;
        }

        .mural-about {
            background: linear-gradient(135deg, #f0f2ff 0%, #f8f0ff 100%);
            border-radius: 12px;
            padding: 14px 32px 14px 16px;
            margin: 12px 0 8px;
            text-align: left;
        }

        .mural-about p {
            font-size: 13.5px;
            color: #555;
            line-height: 1.6;
            margin: 0;
        }

        .mural-about strong {
            color: #667eea;
        }

        .mural-rules {
            background: #fff8f0;
            border-left: 3px solid #e67e22;
            border-radius: 0 10px 10px 0;
            padding: 10px 32px 10px 14px;
            margin-bottom: 14px;
        }

        .mural-rules p {
            font-size: 12.5px;
            color: #7a5a3a;
            line-height: 1.5;
            margin: 0;
        }

        .comments-list {
            max-height: 50vh;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
            scroll-behavior: smooth;
        }

        .comments-list::-webkit-scrollbar {
            width: 4px;
        }

        .comments-list::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 2px;
        }

        .comments-list::-webkit-scrollbar-thumb {
            background: #bbb;
            border-radius: 2px;
        }

        .comment-empty {
            text-align: center;
            color: #999;
            font-size: 14px;
            padding: 30px 0;
        }

        .comment-item {
            background: #f7f7fb;
            border-radius: 12px;
            padding: 12px 15px;
            text-align: left;
            border-left: 3px solid #667eea;
        }

        .comment-item.highlighted {
            background: #fffbf0;
            border-left: 3px solid #f39c12;
        }

        .comment-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            color: #f39c12;
            background: #fff3d6;
            border-radius: 4px;
            padding: 1px 6px;
            margin-bottom: 5px;
            letter-spacing: 0.3px;
        }

        .comment-author {
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 4px;
        }

        .comment-text {
            font-size: 15px;
            color: #333;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .comment-time {
            font-size: 11px;
            color: #bbb;
            margin-top: 6px;
            text-align: right;
        }

        .comment-form {
            border-top: 1px solid #eee;
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            resize: vertical;
            box-sizing: border-box;
        }

        .form-input:focus,
        .form-textarea:focus {
            border-color: #667eea;
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .char-counter {
            font-size: 12px;
            color: #bbb;
        }

        .form-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .form-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .form-submit:not(:disabled):hover {
            opacity: 0.9;
        }

        .form-message {
            font-size: 13px;
            min-height: 18px;
            text-align: center;
            color: #c0392b;
        }

        .form-message.success {
            color: #27ae60;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">QR</div>
    <h1>baila.space</h1>
    <div class="spinner"></div>
    <p class="status-text">Verificando código QR...</p>
    <div class="security-badge">🔒 Conectado com segurança</div>
    <div class="qr-info">Você será redirecionado em instantes</div>
</div>

<script>
    console.log('🚀 Página carregada, iniciando...');

    const firebaseConfig = {
        apiKey: "AIzaSyABFQMxeK9BohIfDdDyX-1gJkvML9xxl-o",
        authDomain: "baila-675c6.firebaseapp.com",
        projectId: "baila-675c6",
        // Configure this in Firebase Console > Analytics > Data Stream
        // It must start with "G-" for GA4.
        measurementId: "G-REPLACE_ME"
    };

    // Verificar se a API Key ainda está como placeholder "SUA_KEY"
    if (firebaseConfig.apiKey === "SUA_KEY") {
        console.error('❌ CRÍTICO: Firebase API Key ainda não foi configurada!');
        console.error('Substitua "SUA_KEY" pela chave real em web/qr/index.html');
        document.body.innerHTML = `
            <div style="
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
                background: #fee;
                font-family: Arial;
            ">
                <div style="
                    background: white;
                    padding: 40px;
                    border-radius: 10px;
                    max-width: 500px;
                    text-align: center;
                    border-left: 4px solid #f44;
                ">
                    <h2 style="color: #c33; margin-top: 0;">⚠️ Configuração Incompleta</h2>
                    <p>A Firebase API Key ainda não foi configurada.</p>
                </div>
            </div>
        `;
        throw new Error('Firebase não configurado');
    }

    console.log('⚙️  Firebase Config:', {
        authDomain: firebaseConfig.authDomain,
        projectId: firebaseConfig.projectId,
        apiKeyPresent: firebaseConfig.apiKey !== "SUA_KEY"
    });

    // Declarar db no escopo global (fora do try/catch)
    let db;
    let analytics;

    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        console.log('✅ Firebase inicializado com sucesso');
    } catch (e) {
        console.error('❌ Erro ao inicializar Firebase:', e);
    }

    if (firebaseConfig.measurementId && firebaseConfig.measurementId !== "G-REPLACE_ME") {
        try {
            analytics = firebase.analytics();
        } catch (error) {
            console.warn('⚠️ Analytics não inicializado. Verifique measurementId/appId no firebaseConfig.', error);
        }
    }

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const sessionStorageKey = 'qr_monitoring_session_id';

    console.log('🔍 QR Code ID obtido:', id);
    console.log('📱 URL completa:', window.location.href);

    function getLastTuesdayStart() {
        const now = new Date();
        const daysSinceTuesday = (now.getDay() + 7 - 2) % 7; // 2 = Tuesday
        const lastTuesday = new Date(now);
        lastTuesday.setDate(now.getDate() - daysSinceTuesday);
        lastTuesday.setHours(0, 0, 0, 0);
        return lastTuesday;
    }

    function getOrCreateSessionId() {
        try {
            let sessionId = sessionStorage.getItem(sessionStorageKey);
            if (!sessionId) {
                sessionId = `session_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
                sessionStorage.setItem(sessionStorageKey, sessionId);
            }
            return sessionId;
        } catch (error) {
            return `session_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
        }
    }

    function collectTrackingContext() {
        return {
            pageUrl: window.location.href,
            pagePath: window.location.pathname,
            referrer: document.referrer || null,
            language: navigator.language || null,
            platform: navigator.platform || null,
            screenWidth: window.screen ? window.screen.width : null,
            screenHeight: window.screen ? window.screen.height : null,
            timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone || null,
            utmSource: params.get('utm_source'),
            utmMedium: params.get('utm_medium'),
            utmCampaign: params.get('utm_campaign')
        };
    }

    function showError(title, message) {
        document.querySelector('.spinner').style.display = 'none';
        document.querySelector('.status-text').innerHTML = '';
        document.querySelector('.qr-info').innerHTML = '';

        const errorHTML = `
            <div class="error-container">
                <div class="error-title">⚠️ ${title}</div>
                <div class="error-message">${message}</div>
            </div>
        `;
        document.querySelector('.container').innerHTML += errorHTML;
    }

    function showText(text) {
        const container = document.querySelector('.container');
        container.innerHTML = '';

        const textDiv = document.createElement('div');
        textDiv.className = 'text-container';
        const contentDiv = document.createElement('div');
        contentDiv.className = 'text-content';
        contentDiv.textContent = text;
        textDiv.appendChild(contentDiv);
        container.appendChild(textDiv);
    }

    function sanitizeInput(str, maxLen) {
        if (typeof str !== 'string') return '';
        // Remove C0/C1 control characters except \t, \n, \r
        return str.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F-\x9F]/g, '').slice(0, maxLen);
    }

    function showMural(id) {
        const container = document.querySelector('.container');
        container.style.maxWidth = '600px';
        container.style.padding = '30px 20px';

        // Header
        const header = document.createElement('div');
        header.className = 'mural-header';

        const title = document.createElement('h2');
        title.className = 'mural-title';
        title.textContent = '💬 Mural';
        header.appendChild(title);

        function makeDismissible(el) {
            el.classList.add('mural-notice');
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'mural-notice-close';
            btn.setAttribute('aria-label', 'Fechar');
            btn.textContent = '✕';
            btn.addEventListener('click', () => {
                el.style.transition = 'opacity 0.2s';
                el.style.opacity = '0';
                setTimeout(() => { el.style.display = 'none'; }, 200);
            });
            el.appendChild(btn);
        }

        const about = document.createElement('div');
        about.className = 'mural-about';
        const aboutP = document.createElement('p');
        aboutP.innerHTML = 'Um espaço para <strong>conectar quem está no por ai</strong> 🎉 '
            + 'Conta qual é a boa, compartilha seu insta se quiser ou deixa uma mensagem '
            + 'pra galera. É um <strong>mural aberto</strong>, não um chat. '
            + 'Se quiser, diga em que região o qrcode foi acessado. '
            + '(O mural reseta toda terça-feira.)';
        about.appendChild(aboutP);
        makeDismissible(about);
        header.appendChild(about);

        const rules = document.createElement('div');
        rules.className = 'mural-rules';
        const rulesP = document.createElement('p');
        rulesP.textContent = '⚠️ Proibido: xingamentos, desrespeito, discurso de ódio '
            + 'ou qualquer conteúdo que constranja outras pessoas. '
            + 'Comentários inadequados serão removidos e o autor poderá ser denunciado.';
        rules.appendChild(rulesP);
        makeDismissible(rules);
        header.appendChild(rules);

        // Comments list
        const commentsList = document.createElement('div');
        commentsList.className = 'comments-list';

        // Form
        const form = document.createElement('form');
        form.className = 'comment-form';

        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'form-input';
        nameInput.placeholder = 'Seu nome (opcional)';
        nameInput.maxLength = 60;
        nameInput.autocomplete = 'off';

        const textarea = document.createElement('textarea');
        textarea.className = 'form-textarea';
        textarea.placeholder = 'Escreva um comentário...';
        textarea.maxLength = 500;
        textarea.rows = 3;

        const formFooter = document.createElement('div');
        formFooter.className = 'form-footer';

        const charCounter = document.createElement('span');
        charCounter.className = 'char-counter';
        charCounter.textContent = '0/500';

        const submitBtn = document.createElement('button');
        submitBtn.type = 'submit';
        submitBtn.className = 'form-submit';
        submitBtn.textContent = 'Enviar';

        const formMsg = document.createElement('div');
        formMsg.className = 'form-message';

        formFooter.appendChild(charCounter);
        formFooter.appendChild(submitBtn);
        form.appendChild(nameInput);
        form.appendChild(textarea);
        form.appendChild(formFooter);
        form.appendChild(formMsg);

        // Render container
        container.innerHTML = '';
        container.appendChild(header);
        container.appendChild(commentsList);
        container.appendChild(form);

        // Character counter
        textarea.addEventListener('input', () => {
            charCounter.textContent = `${textarea.value.length}/500`;
        });

        // Real-time comments listener
        function renderComments(snapshot) {
            commentsList.innerHTML = '';
            if (snapshot.empty) {
                const empty = document.createElement('div');
                empty.className = 'comment-empty';
                empty.textContent = 'Nenhum comentário ainda. Seja o primeiro!';
                commentsList.appendChild(empty);
                return;
            }
            snapshot.forEach((doc) => {
                const data = doc.data();
                const item = document.createElement('div');
                item.className = data.highlighted === true
                    ? 'comment-item highlighted'
                    : 'comment-item';

                if (data.highlighted === true) {
                    const badge = document.createElement('span');
                    badge.className = 'comment-badge';
                    badge.textContent = '⭐ admin';
                    item.appendChild(badge);
                }

                if (data.author && data.author.trim()) {
                    const authorEl = document.createElement('div');
                    authorEl.className = 'comment-author';
                    authorEl.textContent = data.author.trim();
                    item.appendChild(authorEl);
                }

                const textEl = document.createElement('div');
                textEl.className = 'comment-text';
                textEl.textContent = data.text || '';
                item.appendChild(textEl);

                if (data.timestamp && data.timestamp.toDate) {
                    const timeEl = document.createElement('div');
                    timeEl.className = 'comment-time';
                    timeEl.textContent = data.timestamp.toDate().toLocaleString('pt-BR', {
                        dateStyle: 'short',
                        timeStyle: 'short'
                    });
                    item.appendChild(timeEl);
                }

                commentsList.appendChild(item);
            });
            commentsList.scrollTop = commentsList.scrollHeight;
        }

        db.collection('qrcodes').doc(id).collection('comments')
            .where('timestamp', '>=', getLastTuesdayStart())
            .orderBy('timestamp', 'asc')
            .onSnapshot(renderComments, (error) => {
                console.error('Erro ao carregar comentários:', error);
            });

        // Submit handler
        const cooldownKey = `mural_last_${id}`;
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            formMsg.textContent = '';
            formMsg.className = 'form-message';

            // Client-side cooldown: 30 s between submissions
            try {
                const lastSent = parseInt(sessionStorage.getItem(cooldownKey) || '0', 10);
                const remaining = Math.ceil((30000 - (Date.now() - lastSent)) / 1000);
                if (remaining > 0) {
                    formMsg.textContent = `Aguarde ${remaining}s antes de enviar outro comentário.`;
                    return;
                }
            } catch (_) {}

            const cleanText = sanitizeInput(textarea.value.trim(), 500);
            const cleanAuthor = sanitizeInput(nameInput.value.trim(), 60);
            if (!cleanText) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';

            fetch('/api/add-mural-comment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ qrCodeId: id, text: cleanText, author: cleanAuthor })
            }).then((res) => {
                if (res.status === 201) {
                    textarea.value = '';
                    charCounter.textContent = '0/500';
                    try { sessionStorage.setItem(cooldownKey, String(Date.now())); } catch (_) {}
                    formMsg.className = 'form-message success';
                    formMsg.textContent = 'Comentário enviado!';
                    setTimeout(() => { formMsg.textContent = ''; }, 3000);
                } else if (res.status === 429) {
                    formMsg.textContent = 'Muitos comentários enviados. Aguarde alguns minutos.';
                } else {
                    return res.json().then((data) => {
                        formMsg.textContent = data.error || 'Erro ao enviar. Tente novamente.';
                    });
                }
            }).catch((error) => {
                console.error('Erro ao enviar comentário:', error);
                formMsg.textContent = 'Erro de conexão. Tente novamente.';
            }).finally(() => {
                submitBtn.textContent = 'Enviar';
                submitBtn.disabled = false;
            });
        });
    }

    if (!id) {
        showError('QR Code inválido', 'O código QR não contém um identificador válido. Verifique se o código está legível e tente novamente.');
    } else {
        const sessionId = getOrCreateSessionId();
        const scanId = `scan_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
        const trackingContext = collectTrackingContext();

        function trackScanInBackground(qrCodeId) {
            try {
                if (analytics) {
                    analytics.logEvent('qr_scan', {
                        qr_code_id: qrCodeId,
                        scan_id: scanId,
                        page_path: trackingContext.pagePath,
                        page_referrer: trackingContext.referrer || 'direct',
                        utm_source: trackingContext.utmSource || 'none',
                        utm_medium: trackingContext.utmMedium || 'none',
                        utm_campaign: trackingContext.utmCampaign || 'none'
                    });
                }
            } catch (error) {
                console.warn('⚠️ Falha ao registrar evento no GA4:', error);
            }

            const payload = JSON.stringify({
                scanId: scanId,
                sessionId: sessionId,
                qrCodeId: qrCodeId,
                pageUrl: trackingContext.pageUrl,
                pagePath: trackingContext.pagePath,
                referrer: trackingContext.referrer,
                userAgent: navigator.userAgent,
                language: trackingContext.language,
                platform: trackingContext.platform,
                screenWidth: trackingContext.screenWidth,
                screenHeight: trackingContext.screenHeight,
                timeZone: trackingContext.timeZone,
                utmSource: trackingContext.utmSource,
                utmMedium: trackingContext.utmMedium,
                utmCampaign: trackingContext.utmCampaign,
                loggedAt: new Date().toISOString()
            });

            try {
                if (navigator.sendBeacon) {
                    // text/plain evita preflight CORS, essencial para não ser cancelado no redirect
                    const blob = new Blob([payload], { type: 'text/plain' });
                    navigator.sendBeacon('/api/log-qr-scan', blob);
                    return;
                }
            } catch (error) {
                console.warn('⚠️ sendBeacon indisponivel, usando fallback:', error);
            }

            fetch('/api/log-qr-scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: payload,
                keepalive: true
            }).catch((error) => {
                console.warn('⚠️ Falha no tracking em background:', error);
            });
        }

        // ⚡ REDIRECT INSTANTÂNEO - Não espera por nada
        db.collection("qrcodes").doc(id).get()
            .then(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    const type = data.type || 'REDIRECT';

                    if (type === 'REDIRECT') {
                        if (data.redirectUrl) {
                            trackScanInBackground(id);
                            // 🚀 REDIRECT IMEDIATO
                            window.location.href = data.redirectUrl;
                        } else {
                            showError('Erro no QR Code', 'O código QR não contém um destino válido. Contate o suporte.');
                        }
                    } else if (type === 'TEXT') {
                        trackScanInBackground(id);
                        showText(data.text || '');
                    } else if (type === 'MURAL') {
                        trackScanInBackground(id);
                        showMural(id);
                    } else {
                        showError('Tipo não suportado', 'Este QR Code possui um tipo não reconhecido.');
                    }
                } else {
                    showError('QR Code não encontrado', 'Este código QR não existe ou foi removido. Por favor, tente outro código.');
                }
            })
            .catch(error => {
                console.error(error);
                showError('Erro de conexão', 'Não foi possível verificar o código QR. Verifique sua conexão com a internet e tente novamente.');
            });
    }
</script>
</body>
</html>
