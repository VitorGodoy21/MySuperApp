<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>MySuperApp - QR Code</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            margin: 30px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #333;
            font-weight: 600;
        }

        .status-text {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .security-badge {
            display: inline-block;
            background: #f0f9ff;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 12px 20px;
            margin-top: 25px;
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
        }

        .error-container {
            background: #fee;
            border-left: 4px solid #f44;
            border-radius: 8px;
            padding: 20px;
            text-align: left;
            margin-top: 20px;
        }

        .error-title {
            font-weight: bold;
            color: #c33;
            margin-bottom: 8px;
        }

        .error-message {
            color: #666;
            font-size: 14px;
        }

        .success-container {
            background: #efe;
            border-left: 4px solid #4a4;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .success-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .qr-info {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 480px) {
            .container {
                padding: 35px 25px;
            }

            h1 {
                font-size: 24px;
            }

            .status-text {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">QR</div>
    <h1>baila.space</h1>
    <div class="spinner"></div>
    <p class="status-text">Verificando código QR...</p>
    <div class="security-badge">🔒 Conectado com segurança</div>
    <div class="qr-info">Você será redirecionado em instantes</div>
</div>

<script>
    console.log('🚀 Página carregada, iniciando...');

    const firebaseConfig = {
        apiKey: "AIzaSyABFQMxeK9BohIfDdDyX-1gJkvML9xxl-o",
        authDomain: "baila-675c6.firebaseapp.com",
        projectId: "baila-675c6",
    };

    // Verificar se a API Key ainda está como placeholder "SUA_KEY"
    if (firebaseConfig.apiKey === "SUA_KEY") {
        console.error('❌ CRÍTICO: Firebase API Key ainda não foi configurada!');
        console.error('Substitua "SUA_KEY" pela chave real em web/qr/index.html');
        document.body.innerHTML = `
            <div style="
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
                background: #fee;
                font-family: Arial;
            ">
                <div style="
                    background: white;
                    padding: 40px;
                    border-radius: 10px;
                    max-width: 500px;
                    text-align: center;
                    border-left: 4px solid #f44;
                ">
                    <h2 style="color: #c33; margin-top: 0;">⚠️ Configuração Incompleta</h2>
                    <p>A Firebase API Key ainda não foi configurada.</p>
                </div>
            </div>
        `;
        throw new Error('Firebase não configurado');
    }

    console.log('⚙️  Firebase Config:', {
        authDomain: firebaseConfig.authDomain,
        projectId: firebaseConfig.projectId,
        apiKeyPresent: firebaseConfig.apiKey !== "SUA_KEY"
    });

    // Declarar db no escopo global (fora do try/catch)
    let db;

    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        console.log('✅ Firebase inicializado com sucesso');
    } catch (e) {
        console.error('❌ Erro ao inicializar Firebase:', e);
    }

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    console.log('🔍 QR Code ID obtido:', id);
    console.log('📱 URL completa:', window.location.href);

    function showError(title, message) {
        document.querySelector('.spinner').style.display = 'none';
        document.querySelector('.status-text').innerHTML = '';
        document.querySelector('.qr-info').innerHTML = '';

        const errorHTML = `
            <div class="error-container">
                <div class="error-title">⚠️ ${title}</div>
                <div class="error-message">${message}</div>
            </div>
        `;
        document.querySelector('.container').innerHTML += errorHTML;
    }

    if (!id) {
        showError('QR Code inválido', 'O código QR não contém um identificador válido. Verifique se o código está legível e tente novamente.');
    } else {
        // Função para obter localização por IP como fallback
        async function getLocationByIP() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    latitude: data.latitude || null,
                    longitude: data.longitude || null,
                    city: data.city || 'Desconhecido',
                    country: data.country_name || 'Desconhecido',
                    method: 'IP'
                };
            } catch (e) {
                return {
                    latitude: null,
                    longitude: null,
                    city: 'Desconhecido',
                    country: 'Desconhecido',
                    method: 'erro'
                };
            }
        }

        // Função para fazer reverse geocoding de coordenadas GPS
        async function reverseGeocode(latitude, longitude) {
            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`
                );
                const data = await response.json();
                const address = data.address || {};
                return {
                    city: address.city || address.town || address.village || 'Desconhecido',
                    country: address.country || 'Desconhecido'
                };
            } catch (e) {
                return {
                    city: 'Desconhecido',
                    country: 'Desconhecido'
                };
            }
        }

        // Função para obter localização do GPS
        function getLocationByGPS() {
            return new Promise((resolve) => {
                if ('geolocation' in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const lat = position.coords.latitude;
                            const lon = position.coords.longitude;
                            const geocoded = await reverseGeocode(lat, lon);
                            resolve({
                                latitude: lat,
                                longitude: lon,
                                city: geocoded.city,
                                country: geocoded.country,
                                method: 'GPS'
                            });
                        },
                        () => {
                            resolve(null);
                        },
                        { timeout: 5000 }
                    );
                } else {
                    resolve(null);
                }
            });
        }

        // Função para salvar log de acesso no Firebase
        async function saveAccessLog(location) {
            try {
                const accessLog = {
                    qrCodeId: id,
                    timestamp: new Date(),
                    latitude: location.latitude || null,
                    longitude: location.longitude || null,
                    city: location.city || 'Desconhecido',
                    country: location.country || 'Desconhecido',
                    userAgent: navigator.userAgent,
                    method: location.method || 'desconhecido'
                };

                console.log('📍 Tentando salvar acesso:', accessLog);

                await db.collection("qrcodes").doc(id)
                    .collection("access_logs")
                    .add(accessLog);

                console.log('✅ Acesso registrado com sucesso:', accessLog);
            } catch (error) {
                console.error('❌ Erro ao registrar acesso:', error);
                console.error('Detalhes:', error.message, error.code);
            }
        }

        setTimeout(async () => {
            // Tenta obter localização por GPS primeiro, senão usa IP
            let location = await getLocationByGPS();
            if (!location) {
                location = await getLocationByIP();
            }

            // Salva o log de acesso
            await saveAccessLog(location);

            // Busca e redireciona para o QR Code
            db.collection("qrcodes").doc(id).get()
                .then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.redirectUrl) {
                            window.location.href = data.redirectUrl;
                        } else {
                            showError('Erro no QR Code', 'O código QR não contém um destino válido. Contate o suporte.');
                        }
                    } else {
                        showError('QR Code não encontrado', 'Este código QR não existe ou foi removido. Por favor, tente outro código.');
                    }
                })
                .catch(error => {
                    console.error(error);
                    showError('Erro de conexão', 'Não foi possível verificar o código QR. Verifique sua conexão com a internet e tente novamente.');
                });
        }, 800);
    }
</script>
</body>
</html>
