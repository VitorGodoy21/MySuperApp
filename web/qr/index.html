<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>QR Code</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
<p>QR Code 123</p>
<script>
    const firebaseConfig = {
      apiKey: "SUA_KEY",
      authDomain: "baila-675c6.firebaseapp.com",
      projectId: "baila-675c6",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      document.body.innerHTML = "QR inválido";
    } else {
      db.collection("qrcodes").doc(id).get()
        .then(doc => {
          if (doc.exists) {
            const data = doc.data();

            if (data.redirectUrl) {
              window.location.href = data.redirectUrl;
            } else {
              document.body.innerHTML = "Campo redirectUrl não encontrado";
            }
          } else {
            document.body.innerHTML = "QR não encontrado!";
          }
        })
        .catch(error => {
          console.error(error);
          document.body.innerHTML = "Erro ao buscar QR";
        });
    }
</script>
</body>
</html>
